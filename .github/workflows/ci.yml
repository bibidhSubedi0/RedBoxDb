name: RedBoxDb CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-verify:
    runs-on: windows-latest

    steps:
    # 1. Checkout Code
    - uses: actions/checkout@v3

    # 2. Setup Python (for Client verification scripts)
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install Python Dependencies
      run: pip install numpy

    # 3. Configure CMake
    - name: Configure CMake
      run: cmake -S . -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=g++

    # 4. Build the Server & Tests
    - name: Build Project
      run: cmake --build build

    # 5. Run C++ Unit Tests (GTest)
    - name: Run C++ Unit Tests
      run: |
        cd build/tests
        if (Test-Path RedBoxDbTests.exe) { .\RedBoxDbTests.exe }

    # 6. Run Python Integration Tests (The Real Test)
    - name: Run System Verification
      shell: powershell
      run: |
        echo "Starting RedBoxServer..."
        $server = Start-Process -FilePath ".\build\src\RedBoxServer.exe" -PassThru
        
        echo "Waiting 3 seconds for startup..."
        Start-Sleep -Seconds 3

        echo "Running Python Validation..."
        $env:PYTHONPATH = "$PWD/Client"
        
        python Client/validation.py
        
        $testResult = $LASTEXITCODE
        
        echo "Stopping Server..."
        Stop-Process -Id $server.Id -Force
        
        if ($testResult -ne 0) { 
            echo " Verification Failed!"
            exit $testResult 
        }
        echo " Verification Passed!"