name: Benchmarks

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: bench-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Configure git identity
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build CiBench
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=g++
          cmake --build build --target CiBench -j$(nproc)

      - name: Run benchmarks (push to main)
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 benchmark/ci_bench.py commit
          BRANCH="bench/report-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"
          gh pr create --title "bench: update performance report" \
            --body "Auto-generated benchmark report update." \
            --base master --head "$BRANCH"
          gh pr merge --auto --squash

      - name: Run benchmarks and post comment (PR)
        if: github.event_name == 'pull_request'
        run: |
          COMMENT=$(python3 benchmark/ci_bench.py pr)
          echo "$COMMENT" > /tmp/bench_comment.md
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body-file /tmp/bench_comment.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
